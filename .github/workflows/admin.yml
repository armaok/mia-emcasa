name: Admin MIA

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Acao a executar'
        required: true
        type: choice
        options:
          - truncate_conversas
          - truncate_telegram
          - backup_conversas
          - status_servicos
          - logs_n8n
          - logs_evolution
          - restart_n8n
          - restart_evolution
          - backup_configs

jobs:
  admin:
    runs-on: ubuntu-latest
    steps:
      - name: Executa acao no VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            ACTION="${{ github.event.inputs.action }}"

            if [ "$ACTION" = "truncate_conversas" ]; then
              docker exec postgres_mia psql -U mia -d mia -c "TRUNCATE conversas_mia;"
              echo "Banco de conversas WhatsApp limpo!"

            elif [ "$ACTION" = "truncate_telegram" ]; then
  docker exec postgres_mia psql "postgresql://neondb_owner:npg_xERdb4rjLDJ6@ep-damp-truth-ace0yru9-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require" -c "DELETE FROM conversas_telegram;"
  echo "Historico Telegram limpo!"

            elif [ "$ACTION" = "backup_conversas" ]; then
              ARQUIVO="backup_conversas_$(date +%Y%m%d_%H%M%S).sql"
              docker exec postgres_mia pg_dump -U mia -d mia -t conversas_mia > /tmp/$ARQUIVO
              echo "Backup gerado: /tmp/$ARQUIVO"
              cat /tmp/$ARQUIVO | head -20

            elif [ "$ACTION" = "status_servicos" ]; then
              echo "STATUS DOS CONTAINERS"
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            elif [ "$ACTION" = "logs_n8n" ]; then
              echo "LOGS N8N ultimas 50 linhas"
              docker logs n8n --tail=50

            elif [ "$ACTION" = "logs_evolution" ]; then
              echo "LOGS EVOLUTION ultimas 50 linhas"
              docker logs evolution --tail=50

            elif [ "$ACTION" = "restart_n8n" ]; then
              docker restart n8n
              echo "n8n reiniciado!"

            elif [ "$ACTION" = "restart_evolution" ]; then
              docker restart evolution
              echo "Evolution reiniciada!"

            elif [ "$ACTION" = "backup_configs" ]; then
              echo "TRAEFIK"
              cat /docker/traefik/docker-compose.yml
              echo "EVOLUTION"
              cat /docker/evolution/docker-compose.yml
              echo "N8N"
              cat /docker/n8n/docker-compose.yml
              echo "TYPEBOT"
              cat /docker/typebot/docker-compose.yml
              echo "PORTAINER"
              cat /docker/portainer/docker-compose.yml
              echo "UPTIME KUMA"
              cat /docker/uptime-kuma/docker-compose.yml
              echo "POSTGRES MIA"
              cat /docker/postgres-mia/docker-compose.yml
            fi
