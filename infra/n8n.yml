services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    network_mode: host
    environment:
      - N8N_HOST=n8n.emcasa.vet
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.emcasa.vet
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
volumes:
  n8n_data: